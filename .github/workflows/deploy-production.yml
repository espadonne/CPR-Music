name: Deploy Production

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npx @opennextjs/cloudflare build
        env:
          NEXT_PUBLIC_BACKEND_HOST: ${{ vars.PROD_NEXT_PUBLIC_BACKEND_HOST }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy
        run: |
          npx wrangler deploy --name musiccpr-frontend-prod \
            --var NEXTAUTH_URL:${{ vars.PROD_NEXTAUTH_URL }} \
            --var NEXT_PUBLIC_BACKEND_HOST:${{ vars.PROD_NEXT_PUBLIC_BACKEND_HOST }} \
            --var SECRET:${{ secrets.PROD_SECRET }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
